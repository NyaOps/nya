- name: Destroy Worker Nodes
  hosts: all
  become: yes
  
  tasks:
    - name: Kill ALL k3s processes (including agents)
      shell: |
        killall -9 k3s || true
        killall -9 k3s-agent || true
        killall -9 k3s-server || true
        killall -9 containerd || true
        killall -9 containerd-shim || true
      ignore_errors: yes

    - name: Stop ALL k3s services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - k3s
        - k3s-agent
      ignore_errors: yes

    - name: Disable ALL k3s services
      systemd:
        name: "{{ item }}"
        enabled: no
      loop:
        - k3s
        - k3s-agent
      ignore_errors: yes

    - name: Stop K3s agent service
      systemd:
        name: k3s-agent
        state: stopped
      ignore_errors: yes

    - name: Uninstall K3s agent
      shell: |
        if [ -f /usr/local/bin/k3s-agent-uninstall.sh ]; then
          /usr/local/bin/k3s-agent-uninstall.sh
        fi
      args:
        warn: false
      ignore_errors: yes

    - name: Remove K3s directories
      file:
        path: "{{ item }}"
        state: absent
      with_items:
        - /etc/rancher/k3s
        - /var/lib/rancher/k3s
        - /usr/local/bin/k3s
        - /usr/local/bin/kubectl
        - /usr/local/bin/crictl
        - /usr/local/bin/ctr

    - name: Stop Docker service
      systemd:
        name: docker
        state: stopped
      ignore_errors: yes

    - name: Remove Docker daemon config
      file:
        path: /etc/docker/daemon.json
        state: absent

    - name: Uninstall Docker
      apt:
        name: docker-ce
        state: absent
        purge: yes
      ignore_errors: yes

    # For AMD
    # - name: Remove Docker repository
    #   apt_repository:
    #     repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu noble stable"
    #     state: absent

    # For ARM (Raspberry Pi)
    - name: Remove Docker repository
      apt_repository:
        repo: "deb [arch=arm64] https://download.docker.com/linux/debian bullseye stable"
        state: absent

    - name: Remove Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: absent

    - name: Clean up apt cache
      apt:
        autoclean: yes
        autoremove: yes
    
    - name: Clear systemd failed units
      shell: systemctl reset-failed
      ignore_errors: yes

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Clear apt locks
      shell: |
        rm -f /var/lib/apt/lists/lock
        rm -f /var/cache/apt/archives/lock
        rm -f /var/lib/dpkg/lock*
      ignore_errors: yes